---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: App Size Diff
description: Markdown summary of the compressed-size difference between a published image and a locally-built OCI layout

inputs:
  from-app:
    description: Baseline registry image (e.g. :rolling) for comparison
    required: true
  to-oci-layout:
    description: Path to the locally-built OCI image layout (directory) to compare against
    required: true
  platform:
    description: Platform to compare (e.g. linux/amd64)
    required: true

outputs:
  size-diff-markdown:
    description: Markdown formatted output of the app size comparison
    value: ${{ steps.size-diff.outputs.markdown }}

runs:
  using: composite
  steps:
    - name: Setup Mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        experimental: true
        install_args: --locked

    - name: App Size Diff
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: size-diff
      env:
        FROM_APP: ${{ inputs.from-app }}
        TO_OCI_LAYOUT: ${{ inputs.to-oci-layout }}
        PLATFORM: ${{ inputs.platform }}
      with:
        script: |
          const { execFileSync } = require("child_process");

          const fromApp = process.env.FROM_APP;
          const toLayout = process.env.TO_OCI_LAYOUT;
          const platform = process.env.PLATFORM;

          function layerSize(ref) {
            try {
              const json = execFileSync(
                "regctl",
                ["manifest", "get", ref, "--platform", platform, "--format", "{{json .}}"],
                { encoding: "utf8" },
              );
              const layers = JSON.parse(json).layers || [];
              return layers.reduce((sum, l) => sum + (l.size || 0), 0);
            } catch (e) {
              core.warning(`Failed to inspect ${ref}: ${e.message}`);
              return 0;
            }
          }

          function humanBytes(n) {
            const sign = n < 0 ? "-" : "";
            let v = Math.abs(n);
            const units = ["B", "kB", "MB", "GB", "TB"];
            let i = 0;
            while (v >= 1000 && i < units.length - 1) { v /= 1000; i++; }
            return `${sign}${i === 0 ? v : v.toFixed(2)} ${units[i]}`;
          }

          const previous = layerSize(fromApp);
          const current = layerSize(`ocidir://${toLayout}`);
          const change = current - previous;
          const percentage = previous
            ? `${change >= 0 ? "+" : ""}${(change / previous * 100).toFixed(2)}%`
            : (current ? "+∞" : "+0.00%");
          const icon = change < 0 ? "🔽" : change > 0 ? "🔼" : "🔄";

          const output = [
            "## 📦 App Size Analysis",
            "",
            "> [!NOTE]",
            `> Comparing \`${fromApp}\` ➔ this PR build (\`${platform}\`, compressed layers)`,
            "",
            "| Platform | Previous | Current | Change | Trend |",
            "| :-- | :-: | :-: | :-: | :-: |",
            `| ${platform} | ${humanBytes(previous)} | ${humanBytes(current)} | ${change > 0 ? "+" : ""}${humanBytes(change)} (${percentage}) | ${icon} |`,
          ].join("\n");

          core.setOutput("markdown", output);
