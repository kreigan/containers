---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Size Diff Comment

on:
  workflow_run:
    workflows: ["Pull Request"]
    types:
      - completed

permissions:
  contents: read

jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    name: Comment
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download size diff artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: size-diff-*
          path: ${{ runner.temp }}/size-diff

      - name: Post size diff comments
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DIR: ${{ runner.temp }}/size-diff
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const dir = process.env.DIR;
            if (!fs.existsSync(dir)) {
              core.info("No size-diff artifacts; nothing to comment.");
              return;
            }

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: process.env.HEAD_SHA,
            });
            const pr = prs.find(p => p.state === "open");
            if (!pr) {
              core.info(`No open PR for ${process.env.HEAD_SHA}.`);
              return;
            }

            for (const entry of fs.readdirSync(dir)) {
              const sub = path.join(dir, entry);
              if (!fs.statSync(sub).isDirectory()) continue;

              const app = fs.readFileSync(path.join(sub, "app"), "utf8").trim();
              const body = fs.readFileSync(path.join(sub, "body.md"), "utf8");
              if (!app || !body) continue;
              if (!body.startsWith("## 📦 App Size Analysis")) {
                core.warning(`Skipping ${app}: unexpected size-diff body.`);
                continue;
              }

              const marker = `<!-- app-size-diff:${app} -->`;
              const fullBody = `${marker}\n${body.slice(0, 8192)}`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: fullBody,
                });
              }
            }
